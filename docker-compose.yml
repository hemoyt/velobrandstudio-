services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      VELOBRAND_HOME: /data/velobrand
      VELOBRAND_OUTPUT_DIR: /data/designs
    volumes:
      # Settings + project records
      - velobrand-data:/data/velobrand
      # Your generated designs. Swap the named volume for a bind mount
      # (e.g. ./designs:/data/designs) to browse the files directly on
      # the host — that's the folder you'd pick in Settings.
      - velobrand-designs:/data/designs
    restart: unless-stopped

volumes:
  velobrand-data:
  velobrand-designs:
